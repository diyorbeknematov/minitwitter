syntax = "proto3";

package tweet;

option go_package = "github.com/diyorbeknematov/minitwitter/gen/go/tweet";

import "google/protobuf/timestamp.proto";
import "common/common.proto";
import "google/protobuf/empty.proto";

service TweetService {
    rpc CreateTweet(CreateTweetRequest) returns (CreateTweetResponse);
    rpc UpdateTweet(UpdateTweetRequest) returns (google.protobuf.Empty);
    rpc DeleteTweet(DeleteTweetRequest) returns (google.protobuf.Empty);
    
    rpc GetTweet(GetTweetRequest) returns (Tweet);
    rpc GetTweetsByUser(GetTweetsByUserRequest) returns (GetTweetsByUserResponse);

    rpc GetTimeline(GetTimelineRequest) returns (GetTimelineResponse);
    
    rpc LikeTweet(LikeTweetRequest) returns (google.protobuf.Empty);
    rpc UnlikeTweet(UnlikeTweetRequest) returns (google.protobuf.Empty);

    rpc Retweet(RetweetRequest) returns (google.protobuf.Empty);
    rpc UndoRetweet(UndoRetweetRequest) returns (google.protobuf.Empty);
}

message Tweet {
    string id = 1;
    string author_id = 2;
    string content = 3;

    repeated string media_ids = 4;

    string reply_to_tweet_id = 5;

    int64 likes_count = 6;
    int64 retweets_count = 7;

    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
}

message CreateTweetRequest {
    string author_id = 1;
    string content = 2;

    repeated string media_ids = 3;
    string reply_to_tweet_id = 4;
}

message CreateTweetResponse {
  Tweet tweet = 1;
}

message UpdateTweetRequest {
    string tweet_id = 1;
    string content = 2;
}

message DeleteTweetRequest {
    string tweet_id = 1;
}

message GetTweetRequest {
    string tweet_id = 1;
}

message GetTweetsByUserRequest {
    string user_id = 1;
    common.PaginationRequest pagination = 2;
}

message GetTweetsByUserResponse {
    repeated Tweet tweets = 1;
    common.PaginationResponse pagination = 2;
}

message GetTimelineRequest {
  string user_id = 1;
  common.PaginationRequest pagination = 2;
}

message GetTimelineResponse {
  repeated Tweet tweets = 1;
  common.PaginationResponse pagination = 2;
}

message LikeTweetRequest {
    string tweet_id = 1;
}

message UnlikeTweetRequest {
    string tweet_id = 1;
}

message RetweetRequest {
    string tweet_id = 1;
}

message UndoRetweetRequest {
    string tweet_id = 1;
}